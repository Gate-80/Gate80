[alembic]
# Alembic config for the GATE80 platform DB.
# The existing alembic.ini at the repo root manages proxy_logs.db.
# This second config manages data/gate80_platform.db.
#
# Run with:
#   alembic -c alembic_platform.ini upgrade head

script_location = alembic_platform
prepend_sys_path = .

sqlalchemy.url = sqlite:///./data/gate80_platform.db

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
