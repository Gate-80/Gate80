input {
  jdbc {
    jdbc_driver_library => "/Users/wedalotibi/RASD_adaptive-api-deception/logstash/drivers/sqlite-jdbc.jar"
    jdbc_driver_class => "org.sqlite.JDBC"
    jdbc_connection_string => "jdbc:sqlite:/Users/wedalotibi/RASD_adaptive-api-deception/proxy_logs.db"
    jdbc_user => ""
    jdbc_password => ""
    schedule => "* * * * *"
    statement => "
      SELECT
        id,
        request_id,
        timestamp,
        client_ip,
        method,
        path,
        path AS endpoint,
        query_params,
        headers,
        body,
        response_status,
        response_status AS status,
        response_time_ms,
        response_time_ms AS response_time,
        forwarded_to_backend,
        backend_error,
        flagged_as_suspicious,
        suspicion_reason,
        session_id,
        anomaly_score,
        routed_to,
        attack_type,
        created_at,
        'proxy_request' AS doc_kind
      FROM proxy_requests
      WHERE id > :sql_last_value
      ORDER BY id ASC
    "
    use_column_value => true
    tracking_column => "id"
    tracking_column_type => "numeric"
    last_run_metadata_path => "/Users/wedalotibi/RASD_adaptive-api-deception/logstash/.logstash_proxy_last_run"
    clean_run => true
  }

  jdbc {
    jdbc_driver_library => "/Users/wedalotibi/RASD_adaptive-api-deception/logstash/drivers/sqlite-jdbc.jar"
    jdbc_driver_class => "org.sqlite.JDBC"
    jdbc_connection_string => "jdbc:sqlite:/Users/wedalotibi/RASD_adaptive-api-deception/proxy_logs.db"
    jdbc_user => ""
    jdbc_password => ""
    schedule => "* * * * *"
    statement => "
      SELECT
        id,
        request_id,
        timestamp,
        session_id,
        attack_type,
        method,
        path,
        plan_id,
        plan_source,
        model_name,
        prompt_version,
        confidence,
        rationale,
        generation_error,
        response_status_before,
        response_status_after,
        raw_plan,
        validated_plan,
        applied_actions,
        rejected_actions,
        final_body_preview,
        created_at,
        'deception_plan' AS doc_kind
      FROM deception_plan_logs
      WHERE id > :sql_last_value
      ORDER BY id ASC
    "
    use_column_value => true
    tracking_column => "id"
    tracking_column_type => "numeric"
    last_run_metadata_path => "/Users/wedalotibi/RASD_adaptive-api-deception/logstash/.logstash_plan_last_run"
    clean_run => true
  }
}

filter {
  if [doc_kind] == "proxy_request" {
    mutate {
      convert => {
        "id" => "integer"
        "status" => "integer"
        "response_status" => "integer"
        "response_time" => "integer"
        "response_time_ms" => "integer"
        "forwarded_to_backend" => "boolean"
        "flagged_as_suspicious" => "boolean"
        "anomaly_score" => "float"
      }
    }
  }

  if [doc_kind] == "deception_plan" {
    mutate {
      convert => {
        "id" => "integer"
        "response_status_before" => "integer"
        "response_status_after" => "integer"
        "confidence" => "float"
      }
    }

    json {
      source => "validated_plan"
      target => "validated_plan"
    }

    json {
      source => "raw_plan"
      target => "raw_plan"
      skip_on_invalid_json => true
    }

    json {
      source => "applied_actions"
      target => "applied_actions"
    }

    json {
      source => "rejected_actions"
      target => "rejected_actions"
    }

    ruby {
      code => '
        event.set("applied_action_count", Array(event.get("applied_actions")).length)
        event.set("rejected_action_count", Array(event.get("rejected_actions")).length)
      '
    }
  }

  date {
    match => ["created_at", "ISO8601"]
    target => "@timestamp"
  }
}

output {
  if [doc_kind] == "proxy_request" {
    elasticsearch {
      hosts => ["http://localhost:9200"]
      index => "rasd-api-logs"
    }
  }

  if [doc_kind] == "deception_plan" {
    elasticsearch {
      hosts => ["http://localhost:9200"]
      index => "rasd-deception-plans"
    }
  }

  stdout { codec => rubydebug }
}
